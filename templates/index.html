<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Edge Engine - Web GUI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .panel h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #ffed4e;
        }
        
        .match-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .match-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        
        .status {
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status.live {
            background: #ff4444;
        }
        
        .status.upcoming {
            background: #44ff44;
        }
        
        .status.ft {
            background: #888;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .filters select {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Soccer Edge Engine </h1>
            <p>Web-based Soccer Match Analysis Dashboard</p>
        </div>
        
        <div class="dashboard">
            <!-- Analysis Panel -->
            <div class="panel">
                <h2> Match Analysis </h2>
                <form id="analysisForm">
                    <div class="form-group">
                        <label for="homeTeam">Home Team:</label>
                        <input type="text" id="homeTeam" name="homeTeam" placeholder="Enter home team" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="awayTeam">Away Team:</label>
                        <input type="text" id="awayTeam" name="awayTeam" placeholder="Enter away team" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="homeScore">Home Score:</label>
                        <input type="number" id="homeScore" name="homeScore" value="0" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="awayScore">Away Score:</label>
                        <input type="number" id="awayScore" name="awayScore" value="0" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="minute">Minute:</label>
                        <input type="number" id="minute" name="minute" value="0" min="0" max="90">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isLive" name="isLive"> Live Match
                        </label>
                    </div>
                    
                    <button type="submit">Run Analysis</button>
                </form>
                
                <div id="analysisResult" class="result-box" style="display: none;"></div>
            </div>
            
            <!-- Watchlist Panel -->
            <div class="panel">
                <h2> Watchlist </h2>
                
                <div class="filters">
                    <select id="countryFilter">
                        <option value="ALL">All Countries</option>
                        {% for country in data.countries %}
                        <option value="{{ country }}">{{ country }}</option>
                        {% endfor %}
                    </select>
                    
                    <select id="leagueFilter">
                        <option value="ALL">All Leagues</option>
                    </select>
                </div>
                
                <div id="watchlist" class="match-list">
                    <!-- Watchlist items will be loaded here -->
                </div>
                
                <form id="addToWatchlistForm" style="margin-top: 15px;">
                    <div class="form-group">
                        <input type="text" id="newHomeTeam" placeholder="Home Team" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="newAwayTeam" placeholder="Away Team" required>
                    </div>
                    <button type="submit">Add to Watchlist</button>
                </form>
            </div>
        </div>
        
        <!-- History Panel -->
        <div class="panel">
            <h2> Analysis History </h2>
            <div id="historyList" class="match-list">
                <!-- History items will be loaded here -->
            </div>
        </div>
    </div>
    
    <script>
        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadWatchlist();
            loadHistory();
            setupEventListeners();
        });
        
        function setupEventListeners() {
            // Analysis form
            document.getElementById('analysisForm').addEventListener('submit', function(e) {
                e.preventDefault();
                runAnalysis();
            });
            
            // Add to watchlist form
            document.getElementById('addToWatchlistForm').addEventListener('submit', function(e) {
                e.preventDefault();
                addToWatchlist();
            });
            
            // Filter changes
            document.getElementById('countryFilter').addEventListener('change', updateLeagueFilter);
        }
        
        function updateLeagueFilter() {
            const country = document.getElementById('countryFilter').value;
            const leagueFilter = document.getElementById('leagueFilter');
            const leagues = {{ data.leagues | tojson }};
            
            leagueFilter.innerHTML = '<option value="ALL">All Leagues</option>';
            
            if (leagues[country]) {
                leagues[country].forEach(league => {
                    const option = document.createElement('option');
                    option.value = league;
                    option.textContent = league;
                    leagueFilter.appendChild(option);
                });
            }
        }
        
        async function runAnalysis() {
            const formData = new FormData(document.getElementById('analysisForm'));
            const data = {
                home_team: formData.get('homeTeam'),
                away_team: formData.get('awayTeam'),
                home_score: parseInt(formData.get('homeScore')) || 0,
                away_score: parseInt(formData.get('awayScore')) || 0,
                minute: parseInt(formData.get('minute')) || 0,
                is_live: formData.get('isLive') === 'on'
            };
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('analysisResult').style.display = 'block';
                    document.getElementById('analysisResult').innerHTML = `
                        <h3>Analysis Result:</h3>
                        <pre>${JSON.stringify(result.result, null, 2)}</pre>
                    `;
                    loadHistory(); // Refresh history
                } else {
                    alert('Analysis failed: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function loadWatchlist() {
            try {
                const response = await fetch('/api/watchlist');
                const watchlist = await response.json();
                
                const watchlistDiv = document.getElementById('watchlist');
                watchlistDiv.innerHTML = '';
                
                if (Array.isArray(watchlist)) {
                    watchlist.forEach(match => {
                        const matchDiv = document.createElement('div');
                        matchDiv.className = 'match-item';
                        matchDiv.innerHTML = `
                            <div>
                                <strong>${match.home_team}</strong> vs <strong>${match.away_team}</strong>
                                <br><small>${match.league || 'Unknown'}</small>
                            </div>
                            <div>
                                <span class="status ${match.status.toLowerCase()}">${match.status}</span>
                            </div>
                        `;
                        watchlistDiv.appendChild(matchDiv);
                    });
                } else {
                    watchlistDiv.innerHTML = '<p>No matches in watchlist</p>';
                }
            } catch (error) {
                console.error('Error loading watchlist:', error);
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const history = await response.json();
                
                const historyDiv = document.getElementById('historyList');
                historyDiv.innerHTML = '';
                
                if (Array.isArray(history) && history.length > 0) {
                    history.slice(-10).reverse().forEach(entry => {
                        const entryDiv = document.createElement('div');
                        entryDiv.className = 'match-item';
                        entryDiv.innerHTML = `
                            <div>
                                <strong>${entry.home_team}</strong> ${entry.home_score} - ${entry.away_score} <strong>${entry.away_team}</strong>
                                <br><small>${entry.timestamp} - ${entry.analysis_result}</small>
                            </div>
                        `;
                        historyDiv.appendChild(entryDiv);
                    });
                } else {
                    historyDiv.innerHTML = '<p>No analysis history</p>';
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        async function addToWatchlist() {
            const data = {
                home_team: document.getElementById('newHomeTeam').value,
                away_team: document.getElementById('newAwayTeam').value,
                league: 'Custom',
                kickoff_time: 'Unknown'
            };
            
            try {
                const response = await fetch('/api/add_to_watchlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('newHomeTeam').value = '';
                    document.getElementById('newAwayTeam').value = '';
                    loadWatchlist();
                } else {
                    alert('Failed to add to watchlist: ' + result.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
